version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: payouts_db
      POSTGRES_USER: payouts_user
      POSTGRES_PASSWORD: payouts_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payouts_user -d payouts_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
